<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FrontStore Seller Illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe0b2"/>
      <stop offset="55%" stop-color="#ffc270"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3a4a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="380" height="380" rx="36" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="84" y="86" width="252" height="252" rx="26" fill="url(#card)"/>
  </g>

  <g transform="translate(210 165)">
    <path d="M-58 -14h116l-10 72h-96l-10-72z" fill="#fbbf24"/>
    <path d="M-38 -14c0-21 17-38 38-38s38 17 38 38" fill="none" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
    <circle cx="0" cy="25" r="8" fill="#1f2937"/>
  </g>

  <g transform="translate(210 265)">
    <rect x="-76" y="-28" width="152" height="54" rx="12" fill="#ffffff" fill-opacity="0.18"/>
    <text x="0" y="6" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="700" fill="#fff">Seller Central</text>
  </g>

  <text x="210" y="365" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">FrontStore</text>
</svg>
